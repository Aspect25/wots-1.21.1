# Luminite Block — Item Hand Light Properties
# Tells shaders to cast colored light when the item is held
# Supports: Complementary Reimagined, Complementary Unbound, BSL

# Same color ID as the block (10216 = purple in Complementary)
item.10216 = wots:luminite_block

# BSL / other shaders that use item ID range
item.10100 = wots:luminite_block
item.10001 = wots:luminite_block
