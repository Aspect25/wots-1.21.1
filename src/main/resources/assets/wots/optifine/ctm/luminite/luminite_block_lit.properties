# Luminite Block — Full 47-tile Connected Textures (Continuity mod required)
# method=ctm uses all 47 tiles to cover every possible neighbour combination
# This is the same method Minecraft uses internally for its own connected blocks

method=ctm
matchTiles=wots:block/luminite_block_lit
tiles=wots:optifine/ctm/luminite/0-46
connect=block
faces=all
